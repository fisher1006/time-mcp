# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    properties:
      localTimezone:
        type: string
        default: ""
        description: Optional override for the system timezone. If provided, the server
          will use this timezone instead of auto-detected.
  commandFunction:
    # A JS function that produces the CLI command based on the given config to start the MCP on stdio.
    |-
    (config) => { const args = []; if (config.localTimezone && config.localTimezone.trim() !== '') { args.push(`--local-timezone=${config.localTimezone.trim()}`); } return { command: 'mcp-server-time', args }; }
  exampleConfig:
    localTimezone: America/New_York
